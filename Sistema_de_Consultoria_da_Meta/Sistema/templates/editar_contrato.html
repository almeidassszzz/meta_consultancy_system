{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h1>Editar Contrato</h1>

  <form method="post">
    {% csrf_token %}

    <label>Valor negociado</label>
    <input type="number" step="0.01" name="valor_negociado" value="{{ contrato.valor_negociado }}" required><br>

    <label>Data início</label>
    <input type="date" name="data_inicio" value="{{ contrato.data_inicio|date:'Y-m-d' }}" required><br>

    <label>Data fim</label>
    <input type="date" name="data_fim" value="{{ contrato.data_fim|date:'Y-m-d' }}" required><br>

    <button class="btn" type="submit">Salvar</button>
    <a class="btn" href="{% url 'gerenciar_contratos' %}">Cancelar</a>
  </form>
</div>
{% endblock %}
