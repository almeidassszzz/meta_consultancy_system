{% extends 'base.html' %}

{% block nav_links %}
  <li><a href="{% url 'login' %}">Voltar</a></li>
{% endblock %}

{% block content %}
<h1>Criar Nova Conta</h1>

<form method="post">
  {% csrf_token %}

  {{ form.as_p }}

  <button type="submit">Cadastrar</button>
</form>

<p>
  Já tem uma conta?
  <a href="{% url 'login' %}">Faça o login aqui</a>
</p>
{% endblock %}
