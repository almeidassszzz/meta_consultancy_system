{% extends 'base.html' %}

{% block nav_links %}
  <li><a href="{% url 'entrar' %}">Voltar</a></li>
{% endblock %}

{% block content %}
<div class="register-wrapper" style="padding: 24px 16px;">
  <div class="register-card" style="max-width: 420px; width: 100%; margin: 0 auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 8px 20px rgba(0,0,0,.08);">

    <h1>Criar Nova Conta</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit">Cadastrar</button>
    </form>

    <p>
      Já tem uma conta?
      <a href="{% url 'entrar' %}">Faça o login aqui</a>
    </p>

  </div>
</div>
{% endblock %}
