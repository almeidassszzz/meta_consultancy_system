<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Consultoria de RH</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/stylesheet.css' %}">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="{% url 'index' %}">
        <!-- <img src="{% static 'logo.png' %}" alt="Meta Logo"> -->
        <span class="logo-text">Meta — Consultoria de RH</span>
      </a>
    </div>
    <ul class="nav-links">
      {% block nav_links %}{% endblock %}
    </ul>
  </nav>
  <main>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message message-{{ message.tags }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>&copy; 2026 Meta Assessoria. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
