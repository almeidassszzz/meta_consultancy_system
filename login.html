{% extends 'base.html' %} 

{% block nav_links %}
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <h1>Login no Sistema</h1>
    <p class="login-subtitle">Acesse sua conta para continuar</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger" style="margin-bottom: 1.5rem;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form action="{% url 'entrar' %}" method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Digite seu usuário" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Digite sua senha" required>
      </div>

      <button type="submit" class="btn-submit">Entrar</button>
    </form>

    <div class="login-footer">
      <p>Não tem conta? <a href="{% url 'registro' %}">Criar nova conta</a></p>
    </div>
  </div>
</div>
{% endblock %}
